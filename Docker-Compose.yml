services:
  db:
    image: mysql:9.0
    container_name: lojinha-db
    restart: always
    environment:
      MYSQL_DATABASE: lojinha_db
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost", "-u", "root", "-proot"]
      timeout: 5s
      retries: 10

  app:
    build: ./backend
    container_name: lojinha-app
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://lojinha-db:3306/lojinha_db?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update

  frontend:
    build: ./frontend
    container_name: lojinha-front
    ports:
      - "80:80"
    depends_on:
      - app